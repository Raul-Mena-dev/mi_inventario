name: inventario_app
description: Una app de inventario simple con Flutter, SQLite y PDF.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  open_file: ^3.2.1
  # Base de datos SQLite
  sqflite: ^2.3.3
  path: ^1.9.0

  # PDF y compartir archivos
  pdf: ^3.11.0
  path_provider: ^2.1.3
  share_plus: ^10.0.2
  shared_preferences: ^2.2.2

  # Widgets/material
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
